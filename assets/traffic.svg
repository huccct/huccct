<svg xmlns="http://www.w3.org/2000/svg" width="200" height="80" viewBox="0 0 200 80">
  <title>traffic light, stuck on yellow</title>

  <defs>
    <linearGradient id="case" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3d3d3d"/>
      <stop offset="0.5" stop-color="#272727"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>

    <radialGradient id="well" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.55"/>
    </radialGradient>

    <radialGradient id="redBulb" cx="0.38" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#ffb3b3"/>
      <stop offset="0.45" stop-color="#e63946"/>
      <stop offset="1" stop-color="#7d1520"/>
    </radialGradient>

    <radialGradient id="yelBulb" cx="0.38" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#fff6b8"/>
      <stop offset="0.45" stop-color="#f4c430"/>
      <stop offset="1" stop-color="#7e5e0a"/>
    </radialGradient>

    <radialGradient id="grnBulb" cx="0.38" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#bdf0e7"/>
      <stop offset="0.45" stop-color="#2a9d8f"/>
      <stop offset="1" stop-color="#0f4a43"/>
    </radialGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <!-- casing -->
  <rect x="3" y="8" width="194" height="64" rx="14" fill="url(#case)" stroke="#0a0a0a" stroke-width="1"/>
  <!-- top highlight -->
  <rect x="8" y="11" width="184" height="1" fill="#666" opacity="0.55"/>
  <!-- bottom shadow -->
  <rect x="8" y="68" width="184" height="1" fill="#000" opacity="0.5"/>
  <!-- corner rivets -->
  <circle cx="11" cy="15" r="1.3" fill="#0e0e0e"/>
  <circle cx="189" cy="15" r="1.3" fill="#0e0e0e"/>
  <circle cx="11" cy="65" r="1.3" fill="#0e0e0e"/>
  <circle cx="189" cy="65" r="1.3" fill="#0e0e0e"/>

  <!-- RED — x=50 -->
  <g>
    <circle cx="50" cy="40" r="22" fill="#0a0a0a"/>
    <circle cx="50" cy="40" r="22" fill="url(#well)"/>
    <circle cx="50" cy="40" r="22" fill="none" stroke="#404040" stroke-width="0.8"/>
    <circle cx="50" cy="40" r="24" fill="#e63946" opacity="0" filter="url(#glow)">
      <animate attributeName="opacity"
               values="0;0;0.7;0.7;0"
               keyTimes="0;0.955;0.965;0.99;1"
               dur="12s" repeatCount="indefinite"/>
    </circle>
    <circle cx="50" cy="40" r="18" fill="url(#redBulb)" opacity="0.2">
      <animate attributeName="opacity"
               values="0.2;0.2;1;1;0.2"
               keyTimes="0;0.955;0.965;0.99;1"
               dur="12s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="44" cy="33" rx="5" ry="3" fill="#fff" opacity="0">
      <animate attributeName="opacity"
               values="0;0;0.55;0.55;0"
               keyTimes="0;0.955;0.965;0.99;1"
               dur="12s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- YELLOW — x=100, always on -->
  <g>
    <circle cx="100" cy="40" r="22" fill="#0a0a0a"/>
    <circle cx="100" cy="40" r="22" fill="url(#well)"/>
    <circle cx="100" cy="40" r="22" fill="none" stroke="#404040" stroke-width="0.8"/>
    <circle cx="100" cy="40" r="24" fill="#f4c430" opacity="0.55" filter="url(#glow)"/>
    <circle cx="100" cy="40" r="18" fill="url(#yelBulb)"/>
    <ellipse cx="94" cy="33" rx="5" ry="3" fill="#fff" opacity="0.5"/>
  </g>

  <!-- GREEN — x=150 -->
  <g>
    <circle cx="150" cy="40" r="22" fill="#0a0a0a"/>
    <circle cx="150" cy="40" r="22" fill="url(#well)"/>
    <circle cx="150" cy="40" r="22" fill="none" stroke="#404040" stroke-width="0.8"/>
    <circle cx="150" cy="40" r="24" fill="#2a9d8f" opacity="0" filter="url(#glow)">
      <animate attributeName="opacity"
               values="0;0;0.7;0.7;0"
               keyTimes="0;0.935;0.945;0.99;1"
               dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="40" r="18" fill="url(#grnBulb)" opacity="0.2">
      <animate attributeName="opacity"
               values="0.2;0.2;1;1;0.2"
               keyTimes="0;0.935;0.945;0.99;1"
               dur="8s" repeatCount="indefinite"/>
    </circle>
    <ellipse cx="144" cy="33" rx="5" ry="3" fill="#fff" opacity="0">
      <animate attributeName="opacity"
               values="0;0;0.55;0.55;0"
               keyTimes="0;0.935;0.945;0.99;1"
               dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
